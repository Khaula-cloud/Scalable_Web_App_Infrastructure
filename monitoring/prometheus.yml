global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'app1'
    static_configs:
      - targets: ['app1:4000']
    metrics_path: /metrics

  - job_name: 'app2'
    static_configs:
      - targets: ['app2:4000']
    metrics_path: /metrics

  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:80']
    metrics_path: /nginx-health
